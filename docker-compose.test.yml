services:
  db_test:
    image: postgres:16
    container_name: bearcat_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bearcat_test
    ports:
      - "5433:5432"    # ← THIS is the critical line that was missing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bearcat_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025